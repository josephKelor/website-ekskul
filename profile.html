    <link rel="stylesheet" href="style.css">
    <style>
        .profile-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6rem 2rem 2rem 2rem;
        }
        .profile-card-detail {
            background: var(--bg-secondary);
            width: 100%;
            max-width: 700px;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            text-align: center;
            padding: 3rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .detail-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin: 0 auto 1.5rem;
            border: 4px solid var(--accent);
            object-fit: cover;
        }
        .detail-name { font-family: var(--font-heading); font-size: 2rem; margin-bottom: 0.5rem; }
        .detail-role { color: var(--accent); font-weight: 700; margin-bottom: 2rem; letter-spacing: 1px; font-size: 0.9rem; }
        .detail-bio { color: var(--text-muted); line-height: 1.8; margin-bottom: 2rem; text-align: center; }
        .detail-skills { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 2rem; }
        .skill-badge { background: rgba(56, 189, 248, 0.1); color: var(--accent); padding: 6px 16px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
        .back-btn { text-decoration: none; color: var(--text-main); font-weight: 600; opacity: 0.7; transition: 0.3s; display: inline-block; margin-top: 1rem; }
        .back-btn:hover { opacity: 1; color: var(--accent); }
    </style>
</head>
